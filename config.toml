# Limen 配置示例
# headless = true                     # 无界面守护进程模式(服务器/Docker);无 TTY 也会自动降级
# trusted_proxies = ["127.0.0.1"]     # 前置 nginx/caddy 的 IP;配了才会信任 X-Forwarded-For 取真实客户端 IP
# real_ip_header = "X-Forwarded-For"  # 取真实客户端 IP 的请求头,默认 X-Forwarded-For
listen = "127.0.0.1:8080"
upstream = "http://127.0.0.1:8000"
log_file = "limen.log"
db_path = "limen.db"               # SQLite 数据库文件,空=纯内存模式(黑名单/直通/日志不持久)

[detection]
block_threshold = 100       # 规则分数达此值直接拦截
suspicious_threshold = 40   # 达此值但未到 block → 送 LLM 研判
ngram_model = "ml/model.bin" # 二级 char n-gram 分类器模型;留空/删除则不启用第二层
ngram_threshold = 0.9        # 分类器得分达此值 → 把规则判 Allow 的请求提升为 Suspicious 送 LLM
upstream_timeout_secs = 30   # 上游(源站)请求超时秒数,0=不超时(默认 30)
max_body_bytes = 10485760    # 最大请求体字节,超限返回 413;0=沿用硬编码默认(10MB)
gap_log = "gaps.jsonl"       # 缺口捕获 JSONL 路径;留空/删除则不启用
bypass_paths = []            # 直通白名单,以 / 结尾=前缀匹配,否则精确匹配
disabled_categories = []     # 禁用的规则类别(如 ["Scanner","InfoDisclosure"])

[llm]
enabled = true
provider = "openai_compat"                 # 内置仅此一个,兼容 OpenAI/DeepSeek/Ollama/vLLM/Groq 等 OpenAI 兼容端点;异形端点需实现 LlmProvider trait
model = "deepseek-chat"                    # DeepSeek 官方 API 模型名
base_url = "https://api.deepseek.com"      # DeepSeek OpenAI 兼容端点
api_key_env = "OPENAI_API_KEY"             # 填环境变量【名】,不是密钥本身!密钥用 export 设进该变量
timeout_ms = 15000                         # 真实网络往返,放宽超时
fail_mode = "fail_open"
