# Limen 配置示例
listen = "127.0.0.1:8080"
upstream = "http://127.0.0.1:8000"
log_file = "limen.log"

[detection]
block_threshold = 100       # 规则分数达此值直接拦截
suspicious_threshold = 40   # 达此值但未到 block → 送 LLM 研判
ngram_model = "ml/model.bin" # 二级 char n-gram 分类器模型;留空/删除则不启用第二层
ngram_threshold = 0.9        # 分类器得分达此值 → 把规则判 Allow 的请求提升为 Suspicious 送 LLM

[llm]
enabled = true
provider = "openai_compat"                 # anthropic | openai_compat | gemini
model = "deepseek-chat"                    # DeepSeek 官方 API 模型名
base_url = "https://api.deepseek.com"      # DeepSeek OpenAI 兼容端点
api_key_env = "OPENAI_API_KEY"             # 填环境变量【名】,不是密钥本身!密钥用 export 设进该变量
timeout_ms = 15000                         # 真实网络往返,放宽超时
fail_mode = "fail_open"
