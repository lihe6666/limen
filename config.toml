# Limen 配置示例
listen = "127.0.0.1:8080"
upstream = "http://127.0.0.1:8000"
log_file = "limen.log"

[detection]
block_threshold = 100       # 规则分数达此值直接拦截
suspicious_threshold = 40   # 达此值但未到 block → 送 LLM 研判

[llm]
enabled = true
provider = "openai_compat"                 # anthropic | openai_compat | gemini
model = "mock-model"
base_url = "http://127.0.0.1:9000/v1"      # 本地 mock;真实可填 Ollama/OpenAI/DeepSeek 等
api_key_env = "OPENAI_API_KEY"             # openai_compat 下留空亦可
timeout_ms = 2000
fail_mode = "fail_open"
